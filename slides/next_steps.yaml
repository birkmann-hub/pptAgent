name: next_steps
display_name: Next Steps / Action Items
description: >
  Defines the concrete actions to be taken immediately after the meeting,
  including owners and due dates.
layout: table
usage: >
  Near the end of the presentation. Ensures alignment on accountability
  before the meeting closes.
elements:
  - id: title
    type: text
    role: slide_title
    placeholder: "Next Steps"
    font_size: 28
    bold: true
    color: dark_blue
  - id: actions_table
    type: table
    role: main_content
    columns:
      - heading: "#"
        width: 0.05
        color: dark_blue
        text_color: white
      - heading: "Action Item"
        width: 0.45
        color: dark_blue
        text_color: white
      - heading: "Owner"
        width: 0.20
        color: dark_blue
        text_color: white
      - heading: "Due Date"
        width: 0.15
        color: dark_blue
        text_color: white
      - heading: "Status"
        width: 0.15
        color: dark_blue
        text_color: white
    placeholder_rows:
      - ["1", "Schedule kick-off meeting", "Project Lead", "DD.MM.YYYY", "Open"]
      - ["2", "Provide requested data", "Client", "DD.MM.YYYY", "Open"]
      - ["3", "Set up project governance", "PMO", "DD.MM.YYYY", "Open"]
    font_size: 13
    row_alt_color: light_gray
  - id: note
    type: text
    role: footnote
    placeholder: "Status: Open | In Progress | Done"
    font_size: 11
    color: gray
required_content:
  - action_items
ai_prompt_hint: >
  Generate 4-6 concrete next steps that naturally follow from the
  recommendations. Assign a realistic owner role (not a specific name).
  Set due dates relative to today. Include a mix of immediate actions
  (within 1 week) and medium-term actions (within 1 month).
