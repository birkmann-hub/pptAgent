name: context_background
display_name: Context & Background
description: >
  Establishes the situational context: industry trends, regulatory
  environment, company background or project history that the audience
  needs to understand before diving into the problem.
layout: two_column
usage: >
  Early in the presentation, immediately after the executive summary or
  agenda. Provides the "why now" and sets the stage for the problem
  statement.
elements:
  - id: title
    type: text
    role: slide_title
    placeholder: "Context & Background"
    font_size: 28
    bold: true
    color: dark_blue
  - id: left_heading
    type: text
    role: column_heading
    placeholder: "Industry Trends"
    font_size: 16
    bold: true
    color: dark_blue
    column: left
  - id: left_content
    type: list
    role: column_content
    placeholder:
      - "Trend / development 1"
      - "Trend / development 2"
      - "Trend / development 3"
    item_font_size: 14
    column: left
    color: dark_text
  - id: right_heading
    type: text
    role: column_heading
    placeholder: "Company / Project Background"
    font_size: 16
    bold: true
    color: dark_blue
    column: right
  - id: right_content
    type: list
    role: column_content
    placeholder:
      - "Background fact 1"
      - "Background fact 2"
      - "Background fact 3"
    item_font_size: 14
    column: right
    color: dark_text
  - id: source_note
    type: text
    role: footnote
    placeholder: "Sources: ..."
    font_size: 10
    color: gray
required_content:
  - industry_context
  - company_background
ai_prompt_hint: >
  Provide relevant industry trends and company/project background for the
  given sector and project type. Left column covers macro trends; right
  column covers the specific client context. Keep each bullet to one line.
